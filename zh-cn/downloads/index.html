<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载 - Phuyu Cloud</title>
    <link rel="stylesheet" href="../../src/style.css">
    <link rel="icon" type="image/svg+xml" href="../../src/logo-light.svg" />
    <script>
        // Dark mode initialization - must run before page render
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
</head>
<body>
    <header>
        <a href="/zh-cn/" class="logo">
            <img src="../../src/logo-light.svg" alt="Phuyu Cloud" class="logo-icon light">
            <img src="../../src/logo-dark.svg" alt="Phuyu Cloud" class="logo-icon dark">
            <span class="logo-text">Phuyu Cloud</span>
        </a>
        <div class="header-controls">
            <select class="lang-switcher" onchange="window.location.href=this.value">
                <option value="/en/downloads/">English</option>
                <option value="/ja/downloads/">日本語</option>
                <option value="/zh-tw/downloads/">繁體中文</option>
                <option value="/zh-cn/downloads/" selected>简体中文</option>
            </select>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </header>

    <main>
        <div class="hero-card">
            <h1>下载 Phuyu 应用程序</h1>
            <p>选择您的平台，下载最新版本的 Phuyu 应用程序。</p>
        </div>

        <div class="downloads-grid">
            <!-- Desktop App -->
            <div class="download-card">
                <div class="download-icon desktop-icon">💻</div>
                <h2>桌面端</h2>
                <p class="download-version">版本 0.0.1</p>
                <p class="download-desc">支持视频音频翻译、字幕提取、术语库管理等功能</p>
                <div class="download-buttons">
                    <a href="https://github.com/phuyu/translator-desktop/releases/latest" target="_blank" class="cta-button">📥 下载桌面端</a>
                </div>
                <div class="platform-icons">
                    <span class="platform-icon" title="macOS">🍎</span>
                    <span class="platform-icon" title="Windows">🪟</span>
                    <span class="platform-icon" title="Linux">🐧</span>
                </div>
            </div>

            <!-- Web App -->
            <div class="download-card">
                <div class="download-icon web-icon">🌐</div>
                <h2>网页版</h2>
                <p class="download-version">最新版本</p>
                <p class="download-desc">无需下载，直接在浏览器中使用字幕翻译服务</p>
                <div class="download-buttons">
                    <a href="https://trans.phuyu.cloud" class="cta-button">✨ 前往网页版</a>
                </div>
                <div class="platform-icons">
                    <span class="platform-icon" title="Web">🌍</span>
                </div>
            </div>
        </div>

        <div class="info-section">
            <h2>📋 系统需求</h2>
            <ul>
                <li><strong>桌面端</strong>：macOS 11+ / Windows 10+ / Linux (Ubuntu 20.04+)</li>
                <li><strong>网页版</strong>：支持现代浏览器（Chrome、Firefox、Safari、Edge）</li>
            </ul>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Phuyu Cloud. 保留所有权利。</p>
    </footer>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (!localStorage.getItem('theme')) {
                document.documentElement.classList.toggle('dark', e.matches);
            }
        });
    </script>
</body>
</html>
